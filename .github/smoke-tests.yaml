# Per-package smoke test configuration.
#
# One entry per command in .manzolomap. Keys:
#   cmd:       array of arguments passed to the installed command.
#              Default if omitted: ["--help"]
#   apt_deps:  extra apt packages to install before running the smoke
#              (use only for deps not declared in PKG_DEPENDS).
#   skip:      string with the reason. When set, the smoke step is
#              reported as skipped (CI stays green) instead of running.
#
# The runner installs the .deb first (via `apt install -y ./package.deb`)
# so PKG_DEPENDS are satisfied automatically by APT.

mchroot:
  cmd: ["--help"]

mcleaner:
  cmd: ["--help"]

mbackup:
  cmd: ["--help"]

mtest:
  cmd: ["--help"]

usb-boot-test:
  cmd: ["--help"]

manzolo-firewall:
  cmd: ["--help"]

manzolo-process-monitor:
  cmd: ["--help"]

dmarc-report:
  cmd: ["--help"]
  apt_deps: [libxml2-utils]
  script: tests/dmarc-report/test.sh

email-domain-check:
  cmd: ["--help"]
  script: tests/email-domain-check/test.sh

firefox-session-recover:
  cmd: ["--help"]
  script: tests/firefox-session-recover/test.sh

network-viewer:
  cmd: ["--help"]

share-manager:
  cmd: ["info"]
  script: tests/share-manager/test.sh

ollama-claude:
  cmd: ["--version"]

ollama-codex:
  cmd: ["--version"]

openrouter-claude:
  cmd: ["--version"]

disk-usage:
  cmd: ["--help"]

manzolo-app:
  cmd: ["--help"]

nvidia-manager:
  cmd: ["--help"]

ssh-manager:
  cmd: ["--help"]

compose-stack-manager:
  cmd: ["--help"]
