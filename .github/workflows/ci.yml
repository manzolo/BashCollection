name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash-syntax:
    name: Bash syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate bash syntax on all scripts
        run: |
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            bash -n "$file"
          done < <(find . -type f -name '*.sh' -print0 | sort -z)

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on ollama-tools
        run: |
          shellcheck utils/ollama-tools/*.sh

  pkg-headers:
    name: PKG headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate mapped scripts and required PKG_* fields
        run: |
          error=0
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            script_path="${line%%#*}"
            command_name="${line#*#}"
            if [[ ! -f "$script_path" ]]; then
              echo "MISSING mapped script: $script_path ($command_name)"
              error=1
              continue
            fi
            for field in PKG_NAME PKG_VERSION PKG_DESCRIPTION; do
              if ! grep -q "^# ${field}:" "$script_path"; then
                echo "MISSING $field in $script_path"
                error=1
              fi
            done
          done < .manzolomap
          exit $error

  smoke-tests:
    name: Smoke tests (published commands)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y curl jq

      - name: Run smoke tests
        run: bash .github/scripts/run-smoke-tests.sh

  ollama-backend-tests:
    name: Ollama tools backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y curl jq

      - name: Run Ollama backend tests
        run: bash .github/scripts/run-ollama-backend-tests.sh
