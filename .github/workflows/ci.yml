name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash-syntax:
    name: Bash syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate bash syntax on all scripts
        run: |
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            bash -n "$file"
          done < <(find . -type f -name '*.sh' -print0 | sort -z)

  shellcheck:
    name: ShellCheck (mapped scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on every mapped script (-S warning)
        run: |
          failed=0
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            script_path="${line%%#*}"
            command_name="${line#*#}"
            echo "::group::shellcheck ${command_name} (${script_path})"
            if ! shellcheck -S warning -x "$script_path"; then
              failed=1
              echo "::error file=${script_path}::shellcheck warnings/errors above"
            fi
            echo "::endgroup::"
          done < .manzolomap
          exit "$failed"

  pkg-headers:
    name: PKG headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate mapped scripts and required PKG_* fields
        run: |
          error=0
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            script_path="${line%%#*}"
            command_name="${line#*#}"
            if [[ ! -f "$script_path" ]]; then
              echo "MISSING mapped script: $script_path ($command_name)"
              error=1
              continue
            fi
            for field in PKG_NAME PKG_VERSION PKG_DESCRIPTION; do
              if ! grep -q "^# ${field}:" "$script_path"; then
                echo "MISSING $field in $script_path"
                error=1
              fi
            done
          done < .manzolomap
          exit $error

  discover:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: bash .github/scripts/discover-packages.sh

  pkg:
    name: pkg
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build prerequisites
        run: sudo apt-get install -y rsync dpkg-dev python3-yaml

      - name: Build .deb
        id: build
        run: |
          deb=$(bash .github/scripts/build-pkg.sh "${{ matrix.package }}")
          echo "deb=$deb" >> "$GITHUB_OUTPUT"
          echo "Built: $deb"

      - name: Install .deb (with APT to resolve deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y "${{ steps.build.outputs.deb }}"

      - name: Smoke test
        run: bash .github/scripts/smoke-test-pkg.sh "${{ matrix.package }}"

  ollama-backend-tests:
    name: Ollama tools backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y curl jq

      - name: Run Ollama backend tests
        run: bash .github/scripts/run-ollama-backend-tests.sh
